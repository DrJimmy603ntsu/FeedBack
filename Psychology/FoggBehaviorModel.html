<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>福格行為模型｜運動保健研究生教學圖</title>
  <style>
    :root {
      --navy: #183b63;
      --blue: #2e6fb7;
      --light-blue: #eaf3fb;
      --green: #dff3e5;
      --green-strong: #2f8f5b;
      --red: #f7d9d6;
      --red-strong: #b94a48;
      --cream: #f7f4ee;
      --text: #17324d;
      --card: #ffffff;
      --gold: #d4a73a;
      --shadow: 0 12px 28px rgba(18, 41, 66, 0.12);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
      background: linear-gradient(180deg, #f3efe8 0%, #f9f7f3 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1360px;
      margin: 0 auto;
      padding: 28px;
    }

    .hero {
      background: linear-gradient(135deg, var(--navy), #234d7f 70%, #2e6fb7);
      color: #fff;
      border-radius: 30px;
      padding: 30px 34px 26px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -60px;
      top: -60px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(36px, 5vw, 68px);
      line-height: 1.05;
      letter-spacing: 0.02em;
      font-weight: 900;
    }

    .hero .sub {
      margin-top: 14px;
      display: inline-block;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
      margin-top: 24px;
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(24,59,99,0.08);
    }

    .factor-card {
      min-height: 180px;
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 18px;
      align-items: center;
    }

    .icon {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      font-size: 46px;
      font-weight: 800;
    }

    .motivation .icon { background: #fff4d8; color: #8c6511; }
    .ability .icon { background: #e6f0ff; color: #25548a; }
    .prompt .icon { background: #fff0d9; color: #c77a00; }

    .factor-card h2 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.05;
    }

    .factor-card h2 span {
      display: block;
      font-size: 18px;
      color: #52718f;
      font-weight: 700;
      margin-top: 6px;
    }

    .factor-card p {
      margin: 0;
      font-size: 17px;
      line-height: 1.7;
    }

    .factor-card ul {
      margin: 10px 0 0;
      padding-left: 18px;
      line-height: 1.7;
      font-size: 15px;
    }

    .main {
      display: grid;
      gap: 20px;
    }

    .chart-card {
      padding: 22px 24px 18px;
    }

    .chart-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .chart-title h3 {
      margin: 0;
      font-size: clamp(28px, 3.4vw, 48px);
      line-height: 1.05;
    }

    .chart-title .formula {
      font-size: 18px;
      font-weight: 800;
      padding: 10px 14px;
      border-radius: 14px;
      background: #edf4fb;
      color: var(--navy);
    }

    .chart {
      position: relative;
      background: linear-gradient(180deg, #fdfefe, #f4f8fb);
      border-radius: 24px;
      height: 500px;
      overflow: hidden;
      border: 1px solid rgba(24,59,99,0.08);
    }

    .axis-y, .axis-x {
      position: absolute;
      background: #22466d;
      border-radius: 999px;
    }

    .axis-y {
      left: 88px;
      bottom: 62px;
      width: 8px;
      height: 360px;
    }

    .axis-x {
      left: 88px;
      bottom: 62px;
      width: calc(100% - 150px);
      height: 8px;
    }

    .axis-y::before, .axis-x::after {
      content: "";
      position: absolute;
      border-style: solid;
    }

    .axis-y::before {
      left: -10px;
      top: -24px;
      border-width: 0 14px 24px 14px;
      border-color: transparent transparent #22466d transparent;
    }

    .axis-x::after {
      right: -24px;
      top: -10px;
      border-width: 14px 0 14px 24px;
      border-color: transparent transparent transparent #22466d;
    }

    .label-y, .label-x {
      position: absolute;
      font-weight: 900;
      color: var(--navy);
      letter-spacing: 0.02em
